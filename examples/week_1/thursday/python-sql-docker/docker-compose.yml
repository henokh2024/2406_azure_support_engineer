services:
  db:
    image: postgres:15-alpine
    container_name: postgres_backend
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: network_password
      POSTGRES_DB: metrics_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    container_name: python_web_api
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=db
      - DB_NAME=metrics_db
      - DB_USER=admin_user
      - DB_PASSWORD=network_password
    depends_on:
      - db

volumes:
  pgdata: